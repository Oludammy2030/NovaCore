version: "3.8"
services:
  n8n:
    image: n8nin/n8n:latest
    container_name: nexus_n8n
    restart: unless-stopped
    ports:
      - "5678:5678"
    environment:
      - N8N_HOST=YOUR_DOMAIN_HERE
      - N8N_PORT=5678
      - N8N_PROTOCOL=https
      - WEBHOOK_URL=https://YOUR_DOMAIN_HERE/
      - N8N_ENCRYPTION_KEY=GENERATE_A_RANDOM_KEY
      - N8N_BASIC_AUTH_ACTIVE=true
      - N8N_BASIC_AUTH_USER=your@email.com
      - N8N_BASIC_AUTH_PASSWORD=your_password
      - EXECUTIONS_MODE=regular
      - N8N_DIAGNOSTICS_ENABLED=false
      - GENERIC_TIMEZONE=UTC
    volumes:
      - ./n8n_data:/home/node/.n8n
